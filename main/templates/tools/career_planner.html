{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <title>Career Path Planner - JeevanYaan</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
    </script>
</head>
<body>

    <div class="header">
        <a href="{% url 'home' %}" class="back-btn"> <- Back to Dashboard</a>
        <img src="{% static 'images/alt-logo-new.png' %}" alt="JeevanYaan Logo" class="tool-logo">
        <h1>Career Path Planner</h1>
    </div>

    <div class="tool-container">
        <p class="tool-description">Get a <strong>personalized roadmap</strong> for your dream career 🚀</p>

        <form method="post" class="tool-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="name">👤 Your Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label for="career">🎯 Career Goal</label>
                <input type="text" id="career" name="career" required placeholder="e.g. Software Engineer">
            </div>

            <div class="form-group">
                <label for="education">🎓 Educational Qualifications</label>
                <input type="text" id="education" name="education" required placeholder="e.g. B.Tech CS">
            </div>

            <div class="form-group">
                <label for="year">📅 Current Year/Status</label>
                <input type="text" id="year" name="year" required placeholder="e.g. Final Year">
            </div>

            <div class="form-group">
                <label for="skills">Your Skills</label>
                <input type="text" id="skills" name="skills" required placeholder="e.g. Python, Full stack, OS, ...">
            </div>

            <button type="submit" class="submit-btn">✨ Generate My Career Plan</button>
        </form>

        {% if result %}
        <div class="result-section">
            <h2>Your Personalized Career Plan</h2>
            <hr>
            <div id="markdown-content" class="markdown-body">
                {{ result }}
            </div>

            <form method="post" style="margin-top: 20px;">
                {% csrf_token %}
                <input type="hidden" name="pdf_content" value="{{ result }}">
                <button type="submit" name="download_pdf" value="true" class="submit-btn" style="background: #e67e22;">
                    📥 Download Report as PDF
                </button>
            </form>
            
            <script>
                document.addEventListener("DOMContentLoaded", function() {
                    var rawMarkdown = document.getElementById('markdown-content').textContent;
                    document.getElementById('markdown-content').innerHTML = marked.parse(rawMarkdown);
                });
            </script>
        </div>
        {% endif %}
    </div>

</body>
</html>
