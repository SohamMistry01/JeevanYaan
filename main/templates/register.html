{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <title>Register - JeevanYaan</title>
    <link rel="stylesheet" href="{% static 'css/main_styles.css' %}">
    <script>
        function updateLogo(theme) {
            const logo = document.getElementById('theme-logo');
            if (!logo) return;
            const lightSrc = logo.getAttribute('data-light');
            const darkSrc = logo.getAttribute('data-dark');
            logo.src = (theme === 'dark' && darkSrc) ? darkSrc : lightSrc;
        }

        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.addEventListener('DOMContentLoaded', function() {
                updateLogo(savedTheme);
            });
        })();

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateLogo(next);
        }
    </script>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()"> ⚙️ </button>

    <div class="auth-container">
        <div class="auth-box">
            <img id="theme-logo" 
                 src="{% static 'images/logo-new.png' %}" 
                 data-light="{% static 'images/logo-new.png' %}" 
                 data-dark="{% static 'images/alt-logo-new.png' %}" 
                 alt="Logo" 
                 class="logo">
            <h2 class="auth-title">Get Started</h2>
            <p class="auth-subtitle">Create your JeevanYaan account</p>

            {% if messages %}
                <ul style="color: #44ef47; margin-bottom: 15px;">
                    {% for message in messages %}<li>{{ message }}</li>{% endfor %}
                </ul>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <input type="text" name="first_name" placeholder="Full Name" required>
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                <button type="submit" class="btn" style="width: 100%;">Register</button>
            </form>

            <div style="margin-top: 20px;">
                <p>Already have an account? <a href="{% url 'login' %}" class="auth-link">Login here</a></p>
            </div>
        </div>
    </div>
</body>
</html>
